name: crm

description: "Wholesale CRM mobile app"
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  google_sign_in: ^6.3.0
  xml: ^6.6.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^16.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    background_color: "#09111A"
    theme_color: "#F18B54"
  windows:
    generate: true
  macos:
    generate: true
  image_path: assets/images/logo.png
