name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: optima-crm-v4-main
        run: flutter pub get

      - name: Build iOS release (no codesign)
        working-directory: optima-crm-v4-main
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        working-directory: optima-crm-v4-main
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r OptimaCRM.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OptimaCRM-iOS
          path: optima-crm-v4-main/OptimaCRM.ipa
          retention-days: 90
